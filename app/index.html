<!DOCTYPE html>
<html>
  <body style="margin:0; overflow:hidden; background: transparent;">
    <div id="container" style="position:relative; width:100vw; height:100vh;">

      <!-- СКРЫТЫЙ video (только источник) -->
      <video id="video" autoplay playsinline style="display:none;"></video>

      <canvas id="canvas"
        style="position:absolute; top:0; left:0;">
      </canvas>

      <canvas id="overlay"
        style="position:absolute; top:0; left:0;">
      </canvas>

    </div>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const overlay = document.getElementById("overlay");
      const overlayCtx = overlay.getContext("2d");

      async function startCapture() {
        const sources = await window.electronAPI.getSources();
        const source = sources[0];

        console.log(sources.map(s => s.name));

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            mandatory: {
              chromeMediaSource: 'desktop',
              chromeMediaSourceId: source.id,
              maxWidth: 1920,
              maxHeight: 1080
            }
          }
        });

        video.srcObject = stream;

        video.onloadedmetadata = () => {
          const width = video.videoWidth;
          const height = video.videoHeight;

          // 👉 правильный размер рендера
          canvas.width = width;
          canvas.height = height;

          overlay.width = width;
          overlay.height = height;

          // 👉 визуально растягиваем под экран
          canvas.style.width = "100vw";
          canvas.style.height = "100vh";

          overlay.style.width = "100vw";
          overlay.style.height = "100vh";

          console.log("FINAL SIZE:", width, height);

          captureFrames();
        };
      }
      let isProcessing = false;

      function captureFrames() {
        setInterval(async () => {

          // всегда рисуем экран (плавно)
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          if (isProcessing) return;

          isProcessing = true;

          const blob = await new Promise(resolve =>
            canvas.toBlob(resolve, "image/jpeg", 0.9)
          );

          const formData = new FormData();
          formData.append("frame", blob);

          try {
            const response = await fetch("http://127.0.0.1:5000/detect", {
              method: "POST",
              body: formData
            });

            const result = await response.json();
            drawBoxes(result.boxes);

          } catch (err) {
            console.error(err);
          }

          isProcessing = false;

        }, 30); // быстрый UI
      }

      function drawBoxes(boxes) {
        overlayCtx.clearRect(0, 0, overlay.width, overlay.height);

        const scaleX = canvas.clientWidth / canvas.width;
        const scaleY = canvas.clientHeight / canvas.height;

        boxes.forEach(box => {
          const x = box.x * scaleX;
          const y = box.y * scaleY;
          const w = box.w * scaleX;
          const h = box.h * scaleY;

          // 👉 ЦЕНЗУРА
          blurArea(x, y, w, h);

          // 👉 (временно можно оставить рамку для дебага)
          overlayCtx.strokeStyle = "red";
          overlayCtx.lineWidth = 2;
          overlayCtx.strokeRect(x, y, w, h);
        });
      }

      function blurArea(x, y, w, h) {
        overlayCtx.filter = "blur(15px)";

        overlayCtx.drawImage(
          canvas, // берём из canvas (чистый экран)
          x, y, w, h,
          x, y, w, h
        );

        overlayCtx.filter = "none";
      }

      startCapture();
    </script>
  </body>
</html>

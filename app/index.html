<!DOCTYPE html>
<html>
  <body style="margin:0; overflow:hidden; background: transparent;">
    <h2>Screen Capture</h2>

    <div id="container" style="position:relative; width:100vw; height:100vh;">

      <video id="video" autoplay playsinline
        style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; object-position: top;">
      </video>

      <canvas id="overlay"
        style="position:absolute; top:0; left:0; width:100%; height:100%;">
      </canvas>

    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const overlay = document.getElementById("overlay");
      const overlayCtx = overlay.getContext("2d");

      async function startCapture() {
        const sources = await window.electronAPI.getSources();
        const source = sources[0];
        
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            mandatory: {
              chromeMediaSource: 'desktop',
              chromeMediaSourceId: source.id
            }
          }
        });
        
        video.srcObject = stream;

        video.onloadedmetadata = () => {
          const width = video.videoWidth;
          const height = video.videoHeight;

          canvas.width = width;
          canvas.height = height;

          overlay.width = width;
          overlay.height = height;

          captureFrames();
        };
      }

      function captureFrames() {
        setInterval(async () => {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          const frame = canvas.toDataURL("image/jpeg", 0.5);

          try {
            const response = await fetch("http://127.0.0.1:5000/detect", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ frame })
            });

            const result = await response.json();

            drawBoxes(result.boxes);

          } catch (err) {
            console.error("Ошибка:", err);
          }

        }, 300);
      }

      function drawBoxes(boxes) {
        overlayCtx.clearRect(0, 0, overlay.width, overlay.height);

        const scaleX = overlay.clientWidth / overlay.width;
        const scaleY = overlay.clientHeight / overlay.height;

        boxes.forEach(box => {
          const x = box.x * scaleX;
          const y = box.y * scaleY;
          const w = box.w * scaleX;
          const h = box.h * scaleY;

          blurArea(x, y, w, h);
        });
      }

      function blurArea(x, y, w, h) {
        overlayCtx.filter = "blur(15px)";

        overlayCtx.drawImage(
          canvas,
          x, y, w, h,   
          x, y, w, h   
        );

        overlayCtx.filter = "none";
      }

      function pixelate(x, y, w, h) {
        const size = 1.5; 
       
        const imageData = ctx.getImageData(x, y, w, h);
        
        const tempCanvas = document.createElement("canvas");
        const tempCtx = tempCanvas.getContext("2d");

        tempCanvas.width = w / size;
        tempCanvas.height = h / size;

        tempCtx.putImageData(imageData, 0, 0);
        tempCtx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height);

        overlayCtx.imageSmoothingEnabled = false;
        overlayCtx.drawImage(
          tempCanvas,
          0, 0, tempCanvas.width, tempCanvas.height,
          x, y, w, h
        );
      }

      startCapture();
    </script>
  </body>
</html>

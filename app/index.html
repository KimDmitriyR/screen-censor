<!DOCTYPE html>
<html>
  <body style="margin:0; overflow:hidden; background: transparent;">
    <div id="container" style="position:relative; width:100vw; height:100vh;">
      <video id="video" autoplay playsinline style="display:none;"></video>

      <canvas id="canvas"
        style="position:absolute; top:0; left:0; width:100%; height:100%;">
      </canvas>

      <canvas id="overlay"
        style="position:absolute; top:0; left:0; width:100%; height:100%;">
      </canvas>
    </div>

    <div id="panel"
         style="position:fixed; top:10px; left:10px; width:320px; max-height:calc(100vh - 20px); overflow:auto; background:rgba(0,0,0,0.88); color:white; padding:12px; z-index:999; font-family:sans-serif; border-radius:12px; backdrop-filter: blur(8px); box-shadow:0 8px 24px rgba(0,0,0,0.35);">
      <div style="font-weight:700; font-size:16px; margin-bottom:10px;">Панель цензуры</div>
      <div id="controls"></div>
    </div>

    <script>
      const PARTS = [
        { id: "face", label: "Лицо", checked: true, group: "Голова" },
        { id: "eyes", label: "Глаза", checked: true, group: "Голова" },

        { id: "shoulders", label: "Плечи", checked: false, group: "Верх тела" },
        { id: "torso", label: "Туловище", checked: true, group: "Верх тела" },
        { id: "chest", label: "Грудь", checked: false, group: "Верх тела" },
        { id: "back", label: "Спина", checked: false, group: "Верх тела" },
        { id: "armpits", label: "Подмышки", checked: false, group: "Верх тела" },
        { id: "navel", label: "Пупок", checked: false, group: "Верх тела" },
        { id: "hips", label: "Бёдра / таз", checked: false, group: "Верх тела" },

        { id: "hands", label: "Кисти", checked: true, group: "Руки" },
        { id: "wrists", label: "Запястья", checked: false, group: "Руки" },
        { id: "forearms", label: "Предплечья", checked: false, group: "Руки" },

        { id: "buttocks", label: "Ягодицы", checked: false, group: "Низ тела" },
        { id: "thighs", label: "Бёдра", checked: false, group: "Низ тела" },
        { id: "knees", label: "Колени", checked: false, group: "Низ тела" },
        { id: "calves", label: "Икры", checked: false, group: "Низ тела" },
        { id: "feet", label: "Ступни", checked: false, group: "Низ тела" },

        { id: "intimate_front", label: "Чувствительная зона спереди", checked: false, group: "Чувствительные зоны" },
        { id: "intimate_back", label: "Чувствительная зона сзади", checked: false, group: "Чувствительные зоны" },

        { id: "silhouette", label: "Силуэт целиком", checked: true, group: "Продвинутое" }
      ];

      const PART_BEHAVIOR = {
        face: { smooth: 0.65, predict: 0.00 },
        eyes: { smooth: 0.75, predict: 0.00 },
        shoulders: { smooth: 0.45, predict: 0.03 },
        torso: { smooth: 0.40, predict: 0.08 },
        chest: { smooth: 0.38, predict: 0.06 },
        back: { smooth: 0.38, predict: 0.06 },
        armpits: { smooth: 0.40, predict: 0.05 },
        navel: { smooth: 0.42, predict: 0.04 },
        hips: { smooth: 0.42, predict: 0.04 },
        buttocks: { smooth: 0.42, predict: 0.04 },
        hands: { smooth: 0.48, predict: 0.12 },
        wrists: { smooth: 0.55, predict: 0.00 },
        forearms: { smooth: 0.45, predict: 0.10 },
        thighs: { smooth: 0.48, predict: 0.10 },
        knees: { smooth: 0.55, predict: 0.02 },
        calves: { smooth: 0.45, predict: 0.08 },
        feet: { smooth: 0.55, predict: 0.02 },
        intimate_front: { smooth: 0.45, predict: 0.00 },
        intimate_back: { smooth: 0.45, predict: 0.00 },
        silhouette: { smooth: 0.35, predict: 0.05 }
      };

      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const overlay = document.getElementById("overlay");
      const overlayCtx = overlay.getContext("2d");

      const smallCanvas = document.createElement("canvas");
      const smallCtx = smallCanvas.getContext("2d");

      const pixelCanvas = document.createElement("canvas");
      const pixelCtx = pixelCanvas.getContext("2d");

      let latestPolygons = [];
      let trackedPolygons = new Map();
      let isInferenceRunning = false;
      let frameCounter = 0;
      let lastInferenceAt = 0;

      const INFER_EVERY_N_FRAMES = 4;
      const INFER_TARGET_MS = 90;
      const STALE_MS = 450;
      const DEFAULT_HOLD_FRAMES = 6;

      function renderControls() {
        const groups = {};
        for (const p of PARTS) {
          if (!groups[p.group]) groups[p.group] = [];
          groups[p.group].push(p);
        }

        const controls = document.getElementById("controls");
        controls.innerHTML = "";

        for (const [group, items] of Object.entries(groups)) {
          const wrap = document.createElement("div");
          wrap.style.marginBottom = "10px";

          const title = document.createElement("div");
          title.textContent = group;
          title.style.fontWeight = "700";
          title.style.margin = "8px 0 6px";
          wrap.appendChild(title);

          for (const item of items) {
            const row = document.createElement("label");
            row.style.display = "block";
            row.style.margin = "4px 0";
            row.style.cursor = "pointer";

            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.id = item.id;
            cb.checked = item.checked;
            cb.style.marginRight = "8px";

            row.appendChild(cb);
            row.appendChild(document.createTextNode(item.label));
            wrap.appendChild(row);
          }

          controls.appendChild(wrap);
        }
      }

      renderControls();

      function currentSettings() {
        const s = {};
        for (const p of PARTS) {
          s[p.id] = document.getElementById(p.id).checked;
        }
        return s;
      }

      function anyEnabled(settings) {
        return Object.values(settings).some(Boolean);
      }

      function behaviorFor(part) {
        return PART_BEHAVIOR[part] || { smooth: 0.4, predict: 0.05 };
      }

      async function startCapture() {
        const sources = await window.electronAPI.getSources();
        const source = sources[0];

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            mandatory: {
              chromeMediaSource: "desktop",
              chromeMediaSourceId: source.id,
              maxWidth: 1920,
              maxHeight: 1080
            }
          }
        });

        video.srcObject = stream;

        video.onloadedmetadata = () => {
          const width = video.videoWidth;
          const height = video.videoHeight;

          canvas.width = width;
          canvas.height = height;
          overlay.width = width;
          overlay.height = height;

          canvas.style.width = "100vw";
          canvas.style.height = "100vh";
          overlay.style.width = "100vw";
          overlay.style.height = "100vh";

          requestAnimationFrame(renderLoop);
          scheduleInference();
        };
      }

      function renderLoop() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const elapsed = performance.now() - lastInferenceAt;
        if (lastInferenceAt === 0 || elapsed <= STALE_MS) {
          const stablePolygons = getPredictedPolygons();
          drawCensor(stablePolygons);
        } else {
          overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
          trackedPolygons.clear();
        }

        requestAnimationFrame(renderLoop);
      }

      async function scheduleInference() {
        const settings = currentSettings();

        if (!anyEnabled(settings)) {
          latestPolygons = [];
          trackedPolygons.clear();
          overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
          setTimeout(scheduleInference, 250);
          return;
        }

        if (isInferenceRunning) {
          setTimeout(scheduleInference, 20);
          return;
        }

        isInferenceRunning = true;
        const started = performance.now();

        try {
          const blob = await new Promise(resolve =>
            canvas.toBlob(resolve, "image/jpeg", 0.85)
          );

          const formData = new FormData();
          formData.append("frame", blob);
          formData.append("settings", JSON.stringify(settings));

          const response = await fetch("http://127.0.0.1:5000/detect", {
            method: "POST",
            body: formData
          });

          const result = await response.json();
          latestPolygons = result.polygons || [];
          lastInferenceAt = performance.now();
          updateTracks(latestPolygons);
        } catch (err) {
          console.error(err);
        } finally {
          isInferenceRunning = false;
          const elapsed = performance.now() - started;
          const wait = Math.max(0, INFER_TARGET_MS - elapsed);
          setTimeout(scheduleInference, wait);
        }
      }

      function smoothPolygon(prevPoints, nextPoints, alpha) {
        if (!prevPoints || !nextPoints || prevPoints.length !== nextPoints.length) {
          return nextPoints;
        }

        const out = [];
        for (let i = 0; i < nextPoints.length; i++) {
          out.push({
            x: prevPoints[i].x * (1 - alpha) + nextPoints[i].x * alpha,
            y: prevPoints[i].y * (1 - alpha) + nextPoints[i].y * alpha
          });
        }
        return out;
      }

      function predictPolygon(points, velocity, ahead) {
        if (!points || !velocity || points.length !== velocity.length || ahead <= 0) {
          return points;
        }

        return points.map((p, i) => ({
          x: p.x + velocity[i].x * ahead,
          y: p.y + velocity[i].y * ahead
        }));
      }

      function updateTracks(rawPolygons) {
        const seen = new Set();

        for (const poly of rawPolygons) {
          seen.add(poly.id);

          const prev = trackedPolygons.get(poly.id);
          const behavior = behaviorFor(poly.part);

          if (!prev) {
            trackedPolygons.set(poly.id, {
              id: poly.id,
              part: poly.part,
              points: poly.points,
              velocity: poly.points.map(() => ({ x: 0, y: 0 })),
              missing: 0
            });
            continue;
          }

          const smoothed = smoothPolygon(prev.points, poly.points, behavior.smooth);

          const velocity = [];
          if (prev.points && smoothed && prev.points.length === smoothed.length) {
            for (let i = 0; i < smoothed.length; i++) {
              const vx = (smoothed[i].x - prev.points[i].x);
              const vy = (smoothed[i].y - prev.points[i].y);

              const oldV = prev.velocity?.[i] || { x: 0, y: 0 };

              velocity.push({
                x: oldV.x * 0.72 + vx * 0.28,
                y: oldV.y * 0.72 + vy * 0.28
              });
            }
          } else {
            for (let i = 0; i < smoothed.length; i++) {
              velocity.push({ x: 0, y: 0 });
            }
          }

          trackedPolygons.set(poly.id, {
            id: poly.id,
            part: poly.part,
            points: smoothed,
            velocity,
            missing: 0
          });
        }

        for (const [id, value] of trackedPolygons.entries()) {
          if (!seen.has(id)) {
            value.missing = (value.missing || 0) + 1;
            if (value.missing > DEFAULT_HOLD_FRAMES) {
              trackedPolygons.delete(id);
            } else {
              trackedPolygons.set(id, value);
            }
          }
        }
      }

      function getPredictedPolygons() {
        const out = [];

        for (const item of trackedPolygons.values()) {
          const behavior = behaviorFor(item.part);
          const predicted = predictPolygon(item.points, item.velocity, behavior.predict);
          out.push({
            ...item,
            points: predicted
          });
        }

        return out;
      }

      function buildPixelatedFrame() {
        const scale = 0.08;
        const smallW = Math.max(1, Math.floor(canvas.width * scale));
        const smallH = Math.max(1, Math.floor(canvas.height * scale));

        smallCanvas.width = smallW;
        smallCanvas.height = smallH;

        pixelCanvas.width = canvas.width;
        pixelCanvas.height = canvas.height;

        smallCtx.drawImage(canvas, 0, 0, smallW, smallH);

        pixelCtx.imageSmoothingEnabled = false;
        pixelCtx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height);
        pixelCtx.drawImage(
          smallCanvas,
          0, 0, smallW, smallH,
          0, 0, pixelCanvas.width, pixelCanvas.height
        );
      }

      function drawCensor(polygons) {
        const enabled = currentSettings();
        overlayCtx.clearRect(0, 0, overlay.width, overlay.height);

        if (!polygons || polygons.length === 0) return;

        buildPixelatedFrame();

        for (const item of polygons) {
          if (!enabled[item.part]) continue;
          if (!item.points || item.points.length < 3) continue;

          overlayCtx.save();
          overlayCtx.beginPath();
          overlayCtx.moveTo(item.points[0].x, item.points[0].y);
          for (let i = 1; i < item.points.length; i++) {
            overlayCtx.lineTo(item.points[i].x, item.points[i].y);
          }
          overlayCtx.closePath();
          overlayCtx.clip();
          overlayCtx.drawImage(pixelCanvas, 0, 0);
          overlayCtx.restore();
        }
      }

      startCapture();
    </script>
  </body>
</html>
